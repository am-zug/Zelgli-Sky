<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZELGLI SKY – Übersicht</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #1a1a1a;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --highlight: #e8f4e8;
      --highlight-stroke: #2d7a2d;
      --filter-active: #1a1a1a;
      --filter-active-text: #ffffff;
      --status-verfuegbar: #2d7a2d;
      --status-reserviert: #d4831a;
      --status-vermietet: #c0392b;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    header {
      border-bottom: 2px solid var(--border);
      padding: 18px 32px 14px;
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    header h1 {
      font-family: Helvetica, Arial, Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      margin: 0 8px;
    }

    .btn-filter {
      background: none;
      border: 1.5px solid var(--border);
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      color: var(--text);
    }

    .btn-filter.active {
      background: var(--filter-active);
      color: var(--filter-active-text);
    }

    .btn-reset {
      margin-left: auto;
      background: none;
      border: 1.5px solid #ccc;
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .main {
      display: flex;
      flex-direction: column;
    }

    .svg-panel {
      height: 360px;
      padding: 18px;
      background: var(--bg);
      border-bottom: 2px solid var(--border);
      overflow: hidden;
    }

    #building-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .table-panel {
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 9px 12px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      cursor: pointer;
    }

    tbody tr {
      border-bottom: 1px solid #ece9e2;
      cursor: pointer;
    }

    tbody tr:hover,
    tbody tr.highlighted {
      background: var(--highlight);
    }

    td {
      padding: 8px 12px;
      font-size: 12px;
    }

    td.apt-id {
      font-weight: 600;
      width: 48px;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .status-verfuegbar .status-dot { background: var(--status-verfuegbar); }
    .status-reserviert .status-dot { background: var(--status-reserviert); }
    .status-vermietet .status-dot { background: var(--status-vermietet); }

    .status-verfuegbar .status-label { color: var(--status-verfuegbar); }
    .status-reserviert .status-label { color: var(--status-reserviert); }
    .status-vermietet .status-label { color: var(--status-vermietet); }

    .factsheet-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid #ccc;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .apt-unit {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .apt-unit:hover rect,
    .apt-unit.highlighted rect {
      filter: brightness(0.9) saturate(1.15);
    }

    @media (max-width: 900px) {
      header {
        padding: 16px 18px 12px;
      }

      header h1 {
        font-size: 22px;
      }

      .filter-bar {
        padding: 10px 18px;
      }

      .svg-panel {
        height: 300px;
        padding: 8px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Zelgli SKY</h1>
  <span class="subtitle">Mietwohnungen · Übersicht</span>
</header>

<div class="filter-bar">
  <span class="filter-label">Typ</span>
  <div class="filter-group">
    <button class="btn-filter active" data-filter="type" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="type" data-val="T1">2.5 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T2">2 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T3">1.5 Zimmer</button>
  </div>

  <div class="filter-sep"></div>

  <span class="filter-label">Status</span>
  <div class="filter-group">
    <button class="btn-filter active" data-filter="status" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="status" data-val="Verfügbar">Verfügbar</button>
    <button class="btn-filter" data-filter="status" data-val="Reserviert">Reserviert</button>
    <button class="btn-filter" data-filter="status" data-val="Vermietet">Vermietet</button>
  </div>

  <button class="btn-reset" id="btn-reset">↺ Zurücksetzen</button>
</div>

<div class="main">
  <div class="svg-panel">
    <svg id="building-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 520"></svg>
  </div>

  <div class="table-panel">
    <table>
      <thead>
        <tr>
          <th data-col="displayOrder">Nr</th>
          <th data-col="rooms">Zimmer</th>
          <th data-col="size">m²</th>
          <th data-col="status">Status</th>
          <th>Info</th>
        </tr>
      </thead>
      <tbody id="apt-tbody"></tbody>
    </table>
  </div>
</div>

<script>
const SHEET_ID = "1OB7uMcJb8pM8stI_XK8P1r2nFwIzWWDCKxQ1qLlr1ig";
const GID = "0";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("building-svg");

const TYPE_META = {
  T1: { rooms: 2.5, size: 68 },
  T2: { rooms: 2.0, size: 52 },
  T3: { rooms: 1.5, size: 32 }
};

const DISPLAY_ORDER = [1, 2, 3, 11, 12, 6, 7, 8, 9, 10, 4, 5, 13, 14, 15];

let APARTMENTS = [];
let activeFilters = { type: "all", status: "all" };
let sortCol = "displayOrder";
let sortDir = 1;

function parseCSV(text) {
  const rows = [];
  let row = [], cell = "", insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i], next = text[i + 1];

    if (char === '"' && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
      if (char === "\r" && next === "\n") i++;
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

function normalizeStatus(value) {
  const v = String(value || "").trim().toLowerCase();

  if (v === "vermietet" || v === "rented") return "Vermietet";
  if (v === "reserviert" || v === "reserved") return "Reserviert";
  if (v === "verfügbar" || v === "verfugbar" || v === "visible" || v === "available") return "Verfügbar";

  return "Verfügbar";
}

function normalizeNumber(value) {
  return parseFloat(String(value || "")
    .replace("m²", "")
    .replace("m2", "")
    .replace(",", ".")
    .trim()
  );
}

function typeFromRoomsOrSize(roomsValue, sizeValue) {
  const rooms = normalizeNumber(roomsValue);
  const size = normalizeNumber(sizeValue);

  if (rooms === 2.5 || size === 68) return "T1";
  if (rooms === 2 || rooms === 2.0 || size === 52) return "T2";
  if (rooms === 1.5 || size === 32) return "T3";

  return null;
}

function isCompactRow(r) {
  const rooms = normalizeNumber(r[0]);
  const size = normalizeNumber(r[1]);
  const nr = Number(String(r[2] || "").trim());

  return (
    [1.5, 2, 2.5].includes(rooms) &&
    [32, 52, 68].includes(size) &&
    Number.isInteger(nr) &&
    nr > 0
  );
}

async function loadSheetData() {
  const res = await fetch(CSV_URL + "&_ts=" + Date.now(), { cache: "no-store" });
  if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);

  const rows = parseCSV(await res.text());

  return rows.slice(1).map(r => {
    let id;
    let roomsRaw;
    let sizeRaw;
    let statusRaw;
    let factsheetRaw;

    if (isCompactRow(r)) {
      // New compact sheet format:
      // Zimmer | m² | Nr | Status | PDF-Link
      roomsRaw = r[0];
      sizeRaw = r[1];
      id = Number((r[2] || "").trim());
      statusRaw = r[3];
      factsheetRaw = r[4];
    } else {
      // Older sheet format:
      // A = Nr, E = Zimmer, F = m², H = Status, I = PDF-Link
      id = Number((r[0] || "").trim());
      roomsRaw = r[4];
      sizeRaw = r[5];
      statusRaw = r[7];
      factsheetRaw = r[8];
    }

    const type = typeFromRoomsOrSize(roomsRaw, sizeRaw);
    if (!id || !type) return null;

    const displayOrderIndex = DISPLAY_ORDER.indexOf(id);

    return {
      id,
      type,
      rooms: TYPE_META[type].rooms,
      size: TYPE_META[type].size,
      factsheet: String(factsheetRaw || "").trim(),
      status: normalizeStatus(statusRaw),
      displayOrder: displayOrderIndex === -1 ? 999 : displayOrderIndex + 1
    };
  }).filter(Boolean);
}

function getStatusColors(status) {
  if (status === "Vermietet") return { living: "#ef3b3b", balcony: "#f77b7b" };
  if (status === "Reserviert") return { living: "#f59f00", balcony: "#ffc266" };
  return { living: "#06bf66", balcony: "#7bd957" };
}

function createRect(x, y, w, h, fill, cls = "") {
  const rect = document.createElementNS(SVG_NS, "rect");
  rect.setAttribute("x", x);
  rect.setAttribute("y", y);
  rect.setAttribute("width", w);
  rect.setAttribute("height", h);
  rect.setAttribute("fill", fill);
  if (cls) rect.setAttribute("class", cls);
  return rect;
}

function createText(x, y, text, size = 18) {
  const t = document.createElementNS(SVG_NS, "text");
  t.setAttribute("x", x);
  t.setAttribute("y", y);
  t.setAttribute("font-family", "Helvetica, Arial, sans-serif");
  t.setAttribute("font-size", size);
  t.setAttribute("fill", "#1a1a1a");
  t.setAttribute("text-anchor", "middle");
  t.setAttribute("dominant-baseline", "middle");
  t.textContent = text;
  return t;
}

function buildSVG() {
  svg.innerHTML = "";

  const scene = document.createElementNS(SVG_NS, "g");

  const lightH = 78;
  const normalW = 58;
  const wideW = normalW * 1.35;
  const gapX = 7;

  const largeDarkH = lightH * 2.5 * 0.6;
  const smallDarkH = lightH * 1.5 * 0.6;

  const baseY = 330;
  const numberY = 410;

  let x = 0;

  [...APARTMENTS]
    .sort((a, b) => a.displayOrder - b.displayOrder)
    .forEach(apt => {
const isSmall = apt.rooms === 1.5 || apt.size === 32 || [4, 5, 11, 12].includes(apt.id);
const isWide = apt.rooms === 2 || apt.size === 52;

const unitW = isWide ? wideW : normalW;
const darkH = isSmall ? smallDarkH : largeDarkH;
      const colors = getStatusColors(apt.status);

      // flipped orientation:
      // light block on top, dark block below
      const balconyY = baseY - lightH - darkH;
      const livingY = baseY - darkH;

      const unit = document.createElementNS(SVG_NS, "g");
      unit.setAttribute("class", "apt-unit");
      unit.setAttribute("id", `svg-apt-${apt.id}`);
      unit.setAttribute("data-id", apt.id);

      unit.appendChild(createRect(x, balconyY, unitW, lightH, colors.balcony, "balcony"));
      unit.appendChild(createRect(x, livingY, unitW, darkH, colors.living, "living"));
      unit.appendChild(createText(x + unitW / 2, numberY, apt.id, 18));

      unit.addEventListener("click", () => {
        if (apt.factsheet) {
          window.open(apt.factsheet, "_blank", "noopener");
        }
      });

      scene.appendChild(unit);
      x += unitW + gapX;
    });

  svg.appendChild(scene);

  const bbox = scene.getBBox();
  const vb = svg.viewBox.baseVal;
  const margin = 20;

  const scale = Math.min(
    (vb.width - margin * 2) / bbox.width,
    (vb.height - margin * 2) / bbox.height
  );

  const tx = (vb.width - bbox.width * scale) / 2 - bbox.x * scale;
  const ty = (vb.height - bbox.height * scale) / 2 - bbox.y * scale;

  scene.setAttribute("transform", `translate(${tx}, ${ty}) scale(${scale})`);

  svg.querySelectorAll(".apt-unit").forEach(el => {
    el.addEventListener("mouseenter", () => highlightApt(el.dataset.id, true));
    el.addEventListener("mouseleave", () => highlightApt(el.dataset.id, false));
  });
}

function statusClass(status) {
  if (status === "Verfügbar") return "status-verfuegbar";
  if (status === "Reserviert") return "status-reserviert";
  if (status === "Vermietet") return "status-vermietet";
  return "";
}

function renderTable() {
  let data = APARTMENTS.filter(a => {
    if (activeFilters.type !== "all" && a.type !== activeFilters.type) return false;
    if (activeFilters.status !== "all" && a.status !== activeFilters.status) return false;
    return true;
  });

  data.sort((a, b) => {
    const av = a[sortCol];
    const bv = b[sortCol];

    if (typeof av === "string") {
      return sortDir * String(av).localeCompare(String(bv));
    }

    return sortDir * ((Number(av) || 0) - (Number(bv) || 0));
  });

  const tbody = document.getElementById("apt-tbody");

  tbody.innerHTML = data.map(a => `
    <tr data-id="${a.id}" class="${statusClass(a.status)}">
      <td class="apt-id">${a.id}</td>
      <td>${a.rooms}</td>
      <td>${a.size} m²</td>
      <td><span class="status-dot"></span><span class="status-label">${a.status}</span></td>
      <td>${a.factsheet ? `<a class="factsheet-link" href="${a.factsheet}" target="_blank" rel="noopener">PDF ↗</a>` : ""}</td>
    </tr>
  `).join("");

  tbody.querySelectorAll("tr").forEach(row => {
    row.addEventListener("mouseenter", () => highlightApt(row.dataset.id, true));
    row.addEventListener("mouseleave", () => highlightApt(row.dataset.id, false));
  });

  document.querySelectorAll(".apt-unit").forEach(el => {
    const id = +el.dataset.id;
    const visible = data.some(a => a.id === id);
    el.style.opacity = visible ? "1" : "0.2";
  });
}

function highlightApt(id, on) {
  const row = document.querySelector(`#apt-tbody tr[data-id="${id}"]`);
  if (row) row.classList.toggle("highlighted", on);

  const svgUnit = document.getElementById(`svg-apt-${id}`);
  if (svgUnit) svgUnit.classList.toggle("highlighted", on);
}

document.querySelectorAll(".btn-filter").forEach(btn => {
  btn.addEventListener("click", () => {
    const group = btn.dataset.filter;

    document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => {
      b.classList.remove("active");
    });

    btn.classList.add("active");
    activeFilters[group] = btn.dataset.val;
    renderTable();
  });
});

document.getElementById("btn-reset").addEventListener("click", () => {
  activeFilters = { type: "all", status: "all" };

  document.querySelectorAll(".btn-filter").forEach(b => {
    b.classList.toggle("active", b.dataset.val === "all");
  });

  sortCol = "displayOrder";
  sortDir = 1;

  renderTable();
});

document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;

    if (sortCol === col) {
      sortDir *= -1;
    } else {
      sortCol = col;
      sortDir = 1;
    }

    renderTable();
  });
});

async function init() {
  APARTMENTS = await loadSheetData();
  buildSVG();
  renderTable();
}

init().catch(err => {
  console.error("Sheet loading failed:", err);
});
</script>

</body>
</html>
