<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZELGLI SKY – Übersicht</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #1a1a1a;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --highlight: #e8f4e8;
      --highlight-stroke: #2d7a2d;

      --filter-active: #1a1a1a;
      --filter-active-text: #ffffff;

      --status-verfuegbar: #2d7a2d;
      --status-reserviert: #d4831a;
      --status-vermietet: #c0392b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    header {
      border-bottom: 2px solid var(--border);
      padding: 18px 32px 14px;
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      margin: 0 8px;
    }

    .btn-filter {
      background: none;
      border: 1.5px solid var(--border);
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.12s;
      color: var(--text);
    }

    .btn-filter:hover { background: #f0ede6; }

    .btn-filter.active {
      background: var(--filter-active);
      color: var(--filter-active-text);
      border-color: var(--filter-active);
    }

    .btn-reset {
      margin-left: auto;
      background: none;
      border: 1.5px solid #ccc;
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .btn-reset:hover {
      border-color: var(--border);
      color: var(--text);
    }

    .main {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - 105px);
      overflow: hidden;
    }

    .table-panel {
      border-right: 2px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 9px 12px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      z-index: 10;
    }

    thead th:hover { color: var(--text); }

    thead th .sort-arrow {
      opacity: 0.3;
      margin-left: 3px;
    }

    thead th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-bottom: 1px solid #ece9e2;
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover,
    tbody tr.highlighted {
      background: var(--highlight);
    }

    tbody tr.highlighted {
      outline: 2px solid var(--highlight-stroke);
      outline-offset: -2px;
    }

    td {
      padding: 8px 12px;
      font-size: 12px;
      vertical-align: middle;
    }

    td.apt-id {
      font-weight: 500;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      width: 48px;
    }

    td.apt-size,
    td.apt-rooms {
      font-variant-numeric: tabular-nums;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .status-verfuegbar .status-dot { background: var(--status-verfuegbar); }
    .status-reserviert .status-dot { background: var(--status-reserviert); }
    .status-vermietet .status-dot { background: var(--status-vermietet); }

    .status-label { font-size: 11px; }
    .status-verfuegbar .status-label { color: var(--status-verfuegbar); }
    .status-reserviert .status-label { color: var(--status-reserviert); }
    .status-vermietet .status-label { color: var(--status-vermietet); }

    .factsheet-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid #ccc;
      padding: 2px 7px;
      letter-spacing: 0.05em;
      transition: all 0.1s;
      white-space: nowrap;
    }

    .factsheet-link:hover {
      color: var(--text);
      border-color: var(--text);
      background: var(--highlight);
    }

    .svg-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    #building-svg {
      width: 100%;
      height: 100%;
    }

    .apt-unit {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .apt-unit .living,
    .apt-unit .balcony,
    .apt-unit .wall-left,
    .apt-unit .wall-back {
      transition: filter 0.15s ease;
    }

    .apt-unit:hover .living,
    .apt-unit:hover .balcony,
    .apt-unit:hover .wall-left,
    .apt-unit:hover .wall-back,
    .apt-unit.highlighted .living,
    .apt-unit.highlighted .balcony,
    .apt-unit.highlighted .wall-left,
    .apt-unit.highlighted .wall-back {
      filter: brightness(0.9) saturate(1.15);
    }

    .apt-unit.highlighted .apt-outline {
      stroke: var(--highlight-stroke);
      stroke-width: 2.5px;
      opacity: 1;
    }

    .table-panel::-webkit-scrollbar { width: 6px; }
    .table-panel::-webkit-scrollbar-track { background: transparent; }
    .table-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    @media (max-width: 900px) {
      .main {
        grid-template-columns: 1fr;
        grid-template-rows: 50vh 50vh;
        height: auto;
      }

      .table-panel {
        border-right: none;
        border-bottom: 2px solid var(--border);
      }

      .svg-panel {
        min-height: 50vh;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>ZELGLI SKY</h1>
  <span class="subtitle">Mietwohnungen · Übersicht</span>
</header>

<div class="filter-bar">
  <span class="filter-label">Typ</span>
  <div class="filter-group" id="filter-type">
    <button class="btn-filter active" data-filter="type" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="type" data-val="T1">2.5 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T2">2 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T3">1.5 Zimmer</button>
  </div>

  <div class="filter-sep"></div>

  <span class="filter-label">Status</span>
  <div class="filter-group" id="filter-status">
    <button class="btn-filter active" data-filter="status" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="status" data-val="Verfügbar">Verfügbar</button>
    <button class="btn-filter" data-filter="status" data-val="Reserviert">Reserviert</button>
    <button class="btn-filter" data-filter="status" data-val="Vermietet">Vermietet</button>
  </div>

  <button class="btn-reset" id="btn-reset">↺ Zurücksetzen</button>
</div>

<div class="main">
  <div class="table-panel">
    <table id="apt-table">
      <thead>
        <tr>
          <th data-col="id">Nr <span class="sort-arrow">↕</span></th>
          <th data-col="rooms">Zimmer <span class="sort-arrow">↕</span></th>
          <th data-col="size">m² <span class="sort-arrow">↕</span></th>
          <th data-col="status">Status <span class="sort-arrow">↕</span></th>
          <th>Info</th>
        </tr>
      </thead>
      <tbody id="apt-tbody"></tbody>
    </table>
  </div>

  <div class="svg-panel">
    <svg id="building-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2600 1100"></svg>
  </div>
</div>

<script>
  const SVG_NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("building-svg");

  const TYPE_META = {
    T1: { rooms: 2.5, size: 68, livingW: 120,       livingD: 300 },
    T2: { rooms: 2.0, size: 52, livingW: 120,       livingD: 150 },
    T3: { rooms: 1.5, size: 32, livingW: 120 * 1.7, livingD: 150 }
  };

  const APARTMENTS = [
    { id: 1,  seq: 1,  type: "T1", status: "Verfügbar",  factsheet: "#apt-01" },
    { id: 2,  seq: 2,  type: "T1", status: "Vermietet",  factsheet: "#apt-02" },
    { id: 3,  seq: 3,  type: "T1", status: "Verfügbar",  factsheet: "#apt-03" },
    { id: 4,  seq: 4,  type: "T2", status: "Reserviert", factsheet: "#apt-04" },
    { id: 5,  seq: 5,  type: "T2", status: "Verfügbar",  factsheet: "#apt-05" },
    { id: 6,  seq: 6,  type: "T1", status: "Vermietet",  factsheet: "#apt-06" },
    { id: 7,  seq: 7,  type: "T1", status: "Verfügbar",  factsheet: "#apt-07" },
    { id: 8,  seq: 8,  type: "T1", status: "Verfügbar",  factsheet: "#apt-08" },
    { id: 9,  seq: 9,  type: "T1", status: "Reserviert", factsheet: "#apt-09" },
    { id: 10, seq: 10, type: "T1", status: "Verfügbar",  factsheet: "#apt-10" },
    { id: 11, seq: 11, type: "T3", status: "Vermietet",  factsheet: "#apt-11" },
    { id: 12, seq: 12, type: "T3", status: "Verfügbar",  factsheet: "#apt-12" },
    { id: 13, seq: 13, type: "T1", status: "Verfügbar",  factsheet: "#apt-13" },
    { id: 14, seq: 14, type: "T1", status: "Reserviert", factsheet: "#apt-14" },
    { id: 15, seq: 15, type: "T1", status: "Verfügbar",  factsheet: "#apt-15" }
  ].map(a => ({
    ...a,
    rooms: TYPE_META[a.type].rooms,
    size: TYPE_META[a.type].size
  }));

  function getStatusColors(status) {
    if (status === "Vermietet") {
      return {
        living: "#ef8a8a",
        balcony: "#e56d6d",
        wallLeft: "#f1b0b0",
        wallBack: "#f6c3c3"
      };
    }
    if (status === "Reserviert") {
      return {
        living: "#f3b35d",
        balcony: "#e89c37",
        wallLeft: "#f6c98f",
        wallBack: "#f9d9ad"
      };
    }
    return {
      living: "#6fcf7a",
      balcony: "#4eb95d",
      wallLeft: "#93dda0",
      wallBack: "#b3e9bb"
    };
  }

  function iso(x, y, z) {
    return {
      x: (x - y) * 0.8660254,
      y: (x + y) * 0.5 - z
    };
  }

  function pointsToString(points, offsetX = 0, offsetY = 0) {
    return points.map(([x, y, z]) => {
      const p = iso(x, y, z);
      return `${p.x + offsetX},${p.y + offsetY}`;
    }).join(" ");
  }

  function drawPolygon(points, fill, offsetX, offsetY, stroke = "none", cls = "") {
    const poly = document.createElementNS(SVG_NS, "polygon");
    poly.setAttribute("points", pointsToString(points, offsetX, offsetY));
    poly.setAttribute("fill", fill);
    poly.setAttribute("stroke", stroke);
    poly.setAttribute("stroke-linejoin", "round");
    if (cls) poly.setAttribute("class", cls);
    return poly;
  }

  function drawGround({ x, y, z, w, d, fill, offsetX = 0, offsetY = 0, cls = "" }) {
    const A = [x,     y,     z];
    const B = [x + w, y,     z];
    const C = [x + w, y + d, z];
    const D = [x,     y + d, z];
    return drawPolygon([A, B, C, D], fill, offsetX, offsetY, "none", cls);
  }

  function drawApartmentShell({
    x, y, z, w, d, h,
    fillLeft,
    fillBack,
    offsetX = 0,
    offsetY = 0
  }) {
    const g = document.createElementNS(SVG_NS, "g");

    const A  = [x,     y,     z];
    const B  = [x + w, y,     z];
    const C  = [x + w, y + d, z];
    const D  = [x,     y + d, z];

    const A2 = [x,     y,     z + h];
    const B2 = [x + w, y,     z + h];
    const C2 = [x + w, y + d, z + h];
    const D2 = [x,     y + d, z + h];

    const leftFace = [D, D2, A2, A];
    const backFace = [A, A2, B2, B];

    g.appendChild(drawPolygon(leftFace, fillLeft, offsetX, offsetY, "none", "wall-left"));
    g.appendChild(drawPolygon(backFace, fillBack, offsetX, offsetY, "none", "wall-back"));

    return g;
  }

  function drawOutline({ x, y, w, livingD, balconyD, h, offsetX = 0, offsetY = 0 }) {
    const g = document.createElementNS(SVG_NS, "g");

    const livingA = [x,     y,            0];
    const livingB = [x + w, y,            0];
    const livingC = [x + w, y + livingD,  0];
    const livingDpt = [x,   y + livingD,  0];

    const livingA2 = [x,     y,            h];
    const livingB2 = [x + w, y,            h];
    const livingD2 = [x,     y + livingD,  h];

    const balconyC = [x + w, y + livingD + balconyD, 0];
    const balconyD2D = [x,   y + livingD + balconyD, 0];

    g.appendChild(drawPolygon([livingA, livingB, livingC, livingDpt], "none", offsetX, offsetY, "transparent", "apt-outline"));
    g.appendChild(drawPolygon([livingDpt, livingD2, livingA2, livingA], "none", offsetX, offsetY, "transparent", "apt-outline"));
    g.appendChild(drawPolygon([livingA, livingA2, livingB2, livingB], "none", offsetX, offsetY, "transparent", "apt-outline"));
    g.appendChild(drawPolygon([livingDpt, livingC, balconyC, balconyD2D], "none", offsetX, offsetY, "transparent", "apt-outline"));

    return g;
  }

  function drawLabel({ x, y, text, offsetX = 0, offsetY = 0 }) {
    const p = iso(x, y, 0);
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", p.x + offsetX);
    t.setAttribute("y", p.y + offsetY + 34);
    t.setAttribute("text-anchor", "middle");
    t.setAttribute("font-size", "34");
    t.setAttribute("font-family", "Syne, sans-serif");
    t.setAttribute("font-weight", "800");
    t.setAttribute("fill", "rgba(0,0,0,0.58)");
    t.textContent = text;
    return t;
  }

  function drawApartment({
    apt,
    x,
    y,
    livingW,
    livingD,
    balconyD,
    livingH,
    offsetX,
    offsetY
  }) {
    const g = document.createElementNS(SVG_NS, "g");
    const colors = getStatusColors(apt.status);

    const groundLiving = drawGround({
      x, y, z: 0,
      w: livingW,
      d: livingD,
      fill: colors.living,
      offsetX, offsetY,
      cls: "living"
    });

    const groundBalcony = drawGround({
      x,
      y: y + livingD,
      z: 0,
      w: livingW,
      d: balconyD,
      fill: colors.balcony,
      offsetX, offsetY,
      cls: "balcony"
    });

    const shell = drawApartmentShell({
      x, y, z: 0,
      w: livingW,
      d: livingD,
      h: livingH,
      fillLeft: colors.wallLeft,
      fillBack: colors.wallBack,
      offsetX, offsetY
    });

    const outline = drawOutline({
      x, y,
      w: livingW,
      livingD,
      balconyD,
      h: livingH,
      offsetX, offsetY
    });

    g.appendChild(groundLiving);
    g.appendChild(groundBalcony);
    g.appendChild(shell);
    g.appendChild(outline);
    g.appendChild(drawLabel({
      x: x + livingW / 2,
      y: y + livingD + balconyD + 18,
      text: `${apt.id}`,
      offsetX, offsetY
    }));

    return g;
  }

  function buildSVG() {
    const scene = document.createElementNS(SVG_NS, "g");

    const balconyD = 120;
    const livingH = 65;
    const gapX = 55;
    const balconyLine = 420;
    const offsetX = 0;
    const offsetY = 0;

    let currentX = 0;

    APARTMENTS.forEach((apt) => {
      const cfg = TYPE_META[apt.type];
      const y = balconyLine - balconyD - cfg.livingD;

      const unit = drawApartment({
        apt,
        x: currentX,
        y,
        livingW: cfg.livingW,
        livingD: cfg.livingD,
        balconyD,
        livingH,
        offsetX,
        offsetY
      });

      unit.setAttribute("class", "apt-unit");
      unit.setAttribute("id", `svg-apt-${apt.id}`);
      unit.setAttribute("data-id", apt.id);

      scene.appendChild(unit);
      currentX += cfg.livingW + gapX;
    });

    svg.innerHTML = "";
    svg.appendChild(scene);

    const bbox = scene.getBBox();
    const vb = svg.viewBox.baseVal;
    const margin = 80;

    const scale = Math.min(
      (vb.width - margin * 2) / bbox.width,
      (vb.height - margin * 2) / bbox.height
    );

    const tx = (vb.width - bbox.width * scale) / 2 - bbox.x * scale;
    const ty = (vb.height - bbox.height * scale) / 2 - bbox.y * scale;

    scene.setAttribute("transform", `translate(${tx}, ${ty}) scale(${scale})`);

    svg.querySelectorAll(".apt-unit").forEach(el => {
      el.addEventListener("mouseenter", () => highlightApt(el.dataset.id, true));
      el.addEventListener("mouseleave", () => highlightApt(el.dataset.id, false));
      el.addEventListener("click", () => {
        const apt = APARTMENTS.find(a => a.id === +el.dataset.id);
        if (apt) window.location.href = apt.factsheet;
      });
    });
  }

  let activeFilters = { type: "all", status: "all" };
  let sortCol = "id";
  let sortDir = 1;

  function statusClass(s) {
    if (s === "Verfügbar") return "status-verfuegbar";
    if (s === "Reserviert") return "status-reserviert";
    if (s === "Vermietet") return "status-vermietet";
    return "";
  }

  function renderTable() {
    let data = APARTMENTS.filter(a => {
      if (activeFilters.type !== "all" && a.type !== activeFilters.type) return false;
      if (activeFilters.status !== "all" && a.status !== activeFilters.status) return false;
      return true;
    });

    data.sort((a, b) => {
      const av = a[sortCol];
      const bv = b[sortCol];
      if (typeof av === "string") return sortDir * av.localeCompare(bv);
      return sortDir * (av - bv);
    });

    const tbody = document.getElementById("apt-tbody");
    tbody.innerHTML = data.map(a => `
      <tr data-id="${a.id}" class="${statusClass(a.status)}">
        <td class="apt-id">${a.id}</td>
        <td class="apt-rooms">${a.rooms}</td>
        <td class="apt-size">${a.size} m²</td>
        <td>
          <span class="status-dot"></span>
          <span class="status-label">${a.status}</span>
        </td>
        <td><a class="factsheet-link" href="${a.factsheet}">PDF ↗</a></td>
      </tr>
    `).join("");

    tbody.querySelectorAll("tr").forEach(row => {
      row.addEventListener("mouseenter", () => highlightApt(row.dataset.id, true));
      row.addEventListener("mouseleave", () => highlightApt(row.dataset.id, false));
      row.addEventListener("click", () => {
        const apt = APARTMENTS.find(a => a.id === +row.dataset.id);
        if (apt) window.location.href = apt.factsheet;
      });
    });

    document.querySelectorAll(".apt-unit").forEach(el => {
      const id = +el.dataset.id;
      const visible = data.some(a => a.id === id);
      el.style.opacity = visible ? "1" : "0.2";
    });
  }

  function highlightApt(id, on) {
    const row = document.querySelector(`#apt-tbody tr[data-id="${id}"]`);
    if (row) row.classList.toggle("highlighted", on);

    const svgUnit = document.getElementById(`svg-apt-${id}`);
    if (svgUnit) svgUnit.classList.toggle("highlighted", on);

    if (on && row) row.scrollIntoView({ block: "nearest", behavior: "smooth" });
  }

  document.querySelectorAll(".btn-filter").forEach(btn => {
    btn.addEventListener("click", () => {
      const group = btn.dataset.filter;
      document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilters[group] = btn.dataset.val;
      renderTable();
    });
  });

  document.getElementById("btn-reset").addEventListener("click", () => {
    activeFilters = { type: "all", status: "all" };
    document.querySelectorAll(".btn-filter").forEach(b => {
      b.classList.toggle("active", b.dataset.val === "all");
    });
    renderTable();
  });

  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1;
      else {
        sortCol = col;
        sortDir = 1;
      }

      document.querySelectorAll("thead th").forEach(t => {
        t.classList.remove("sorted");
        const arrow = t.querySelector(".sort-arrow");
        if (arrow) arrow.textContent = "↕";
      });

      th.classList.add("sorted");
      th.querySelector(".sort-arrow").textContent = sortDir === 1 ? "↓" : "↑";
      renderTable();
    });
  });

  buildSVG();
  renderTable();
</script>

</body>
</html>
