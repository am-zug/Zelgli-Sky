<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZELGLI SKY – Übersicht</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f3ee;
      --surface: #ffffff;
      --border: #1a1a1a;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --highlight: #e8f4e8;
      --highlight-stroke: #2d7a2d;
      --filter-active: #1a1a1a;
      --filter-active-text: #ffffff;
      --status-verfuegbar: #2d7a2d;
      --status-reserviert: #d4831a;
      --status-vermietet: #c0392b;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    header {
      border-bottom: 2px solid var(--border);
      padding: 18px 32px 14px;
      background: var(--surface);
      display: flex;
      align-items: baseline;
      gap: 20px;
    }

    header h1 {
      font-family: Helvetica, Arial, Roboto, sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1;
    }

    header .subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-bar {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .filter-group {
      display: flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-sep {
      width: 1px;
      height: 20px;
      background: #ddd;
      margin: 0 8px;
    }

    .btn-filter {
      background: none;
      border: 1.5px solid var(--border);
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: all 0.12s;
      color: var(--text);
    }

    .btn-filter:hover { background: #f0ede6; }

    .btn-filter.active {
      background: var(--filter-active);
      color: var(--filter-active-text);
      border-color: var(--filter-active);
    }

    .btn-reset {
      margin-left: auto;
      background: none;
      border: 1.5px solid #ccc;
      padding: 4px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      transition: all 0.12s;
    }

    .btn-reset:hover {
      border-color: var(--border);
      color: var(--text);
    }

    .main {
      display: grid;
      grid-template-columns: 420px 1fr;
      height: calc(100vh - 105px);
      overflow: hidden;
    }

    .table-panel {
      border-right: 2px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 9px 12px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      z-index: 10;
    }

    tbody tr {
      border-bottom: 1px solid #ece9e2;
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:hover,
    tbody tr.highlighted {
      background: var(--highlight);
    }

    tbody tr.highlighted {
      outline: 2px solid var(--highlight-stroke);
      outline-offset: -2px;
    }

    td {
      padding: 8px 12px;
      font-size: 12px;
      vertical-align: middle;
    }

    td.apt-id {
      font-weight: 600;
      width: 48px;
    }

    td.apt-size,
    td.apt-rooms {
      font-variant-numeric: tabular-nums;
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .status-verfuegbar .status-dot { background: var(--status-verfuegbar); }
    .status-reserviert .status-dot { background: var(--status-reserviert); }
    .status-vermietet .status-dot { background: var(--status-vermietet); }

    .status-verfuegbar .status-label { color: var(--status-verfuegbar); }
    .status-reserviert .status-label { color: var(--status-reserviert); }
    .status-vermietet .status-label { color: var(--status-vermietet); }

    .factsheet-link {
      font-size: 10px;
      color: var(--text-muted);
      text-decoration: none;
      border: 1px solid #ccc;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .svg-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: var(--bg);
      overflow: hidden;
      position: relative;
    }

    #building-svg {
      width: 100%;
      height: 100%;
    }

    .apt-unit {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .apt-unit rect {
      transition: filter 0.15s ease;
    }

    .apt-unit:hover rect,
    .apt-unit.highlighted rect {
      filter: brightness(0.9) saturate(1.15);
    }

    .apt-unit.highlighted .apt-outline {
      stroke: var(--highlight-stroke);
      stroke-width: 3px;
      opacity: 1;
    }

    @media (max-width: 900px) {
      header {
        padding: 16px 18px 12px;
      }

      header h1 {
        font-size: 22px;
      }

      .filter-bar {
        padding: 10px 18px;
      }

      .main {
        grid-template-columns: 1fr;
        grid-template-rows: auto 60vh;
        height: auto;
      }

      .table-panel {
        border-right: none;
        border-bottom: 2px solid var(--border);
        max-height: 55vh;
      }

      .svg-panel {
        min-height: 60vh;
        padding: 8px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>Zelgli SKY</h1>
  <span class="subtitle">Mietwohnungen · Übersicht</span>
</header>

<div class="filter-bar">
  <span class="filter-label">Typ</span>
  <div class="filter-group">
    <button class="btn-filter active" data-filter="type" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="type" data-val="T1">2.5 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T2">2 Zimmer</button>
    <button class="btn-filter" data-filter="type" data-val="T3">1.5 Zimmer</button>
  </div>

  <div class="filter-sep"></div>

  <span class="filter-label">Status</span>
  <div class="filter-group">
    <button class="btn-filter active" data-filter="status" data-val="all">Alle</button>
    <button class="btn-filter" data-filter="status" data-val="Verfügbar">Verfügbar</button>
    <button class="btn-filter" data-filter="status" data-val="Reserviert">Reserviert</button>
    <button class="btn-filter" data-filter="status" data-val="Vermietet">Vermietet</button>
  </div>

  <button class="btn-reset" id="btn-reset">↺ Zurücksetzen</button>
</div>

<div class="main">
  <div class="table-panel">
    <table>
      <thead>
        <tr>
          <th data-col="id">Nr</th>
          <th data-col="rooms">Zimmer</th>
          <th data-col="size">m²</th>
          <th data-col="status">Status</th>
          <th>Info</th>
        </tr>
      </thead>
      <tbody id="apt-tbody"></tbody>
    </table>
  </div>

  <div class="svg-panel">
    <svg id="building-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500"></svg>
  </div>
</div>

<script>
  const SHEET_ID = "1OB7uMcJb8pM8stI_XK8P1r2nFwIzWWDCKxQ1qLlr1ig";
  const GID = "0";
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${GID}`;

  const SVG_NS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("building-svg");

  const TYPE_META = {
    T1: { rooms: 2.5, size: 68 },
    T2: { rooms: 2.0, size: 52 },
    T3: { rooms: 1.5, size: 32 }
  };

  let APARTMENTS = [];

  function normalizeStatus(value) {
    const v = String(value || "").trim().toLowerCase();

    if (v === "vermietet" || v === "rented") return "Vermietet";
    if (v === "reserviert" || v === "reserved") return "Reserviert";
    if (v === "verfügbar" || v === "verfugbar" || v === "visible" || v === "available") return "Verfügbar";

    return "Verfügbar";
  }

  function typeFromRoomsOrSize(roomsValue, sizeValue) {
    const rooms = parseFloat(String(roomsValue).replace(",", "."));
    const size = parseFloat(String(sizeValue).replace(",", "."));

    if (rooms === 2.5 || size === 68) return "T1";
    if (rooms === 2 || rooms === 2.0 || size === 52) return "T2";
    if (rooms === 1.5 || size === 32) return "T3";

    return null;
  }

  async function loadSheetData() {
    const res = await fetch(CSV_URL + "&_ts=" + Date.now(), { cache: "no-store" });
    if (!res.ok) throw new Error(`Sheet fetch failed: ${res.status}`);

    const text = await res.text();
    const rows = text.trim().split(/\r?\n/).map(r => r.split(","));
    const data = rows.slice(1);

    return data
      .map(r => {
        const id = Number((r[0] || "").trim());
        const roomsRaw = (r[4] || "").trim();
        const sizeRaw = (r[5] || "").replace("m²", "").trim();
        const type = typeFromRoomsOrSize(roomsRaw, sizeRaw);

        if (!id || !type) return null;

        return {
          id,
          seq: id,
          type,
          rooms: TYPE_META[type].rooms,
          size: TYPE_META[type].size,
          factsheet: "#",
          status: normalizeStatus(r[7])
        };
      })
      .filter(Boolean);
  }

  function getStatusColors(status) {
    if (status === "Vermietet") {
      return {
        living: "#ef3b3b",
        balcony: "#f77b7b"
      };
    }

    if (status === "Reserviert") {
      return {
        living: "#f59f00",
        balcony: "#ffc266"
      };
    }

    return {
      living: "#06bf66",
      balcony: "#7bd957"
    };
  }

  function createRect(x, y, w, h, fill, cls = "") {
    const rect = document.createElementNS(SVG_NS, "rect");
    rect.setAttribute("x", x);
    rect.setAttribute("y", y);
    rect.setAttribute("width", w);
    rect.setAttribute("height", h);
    rect.setAttribute("fill", fill);
    if (cls) rect.setAttribute("class", cls);
    return rect;
  }

  function createText(x, y, text, size = 26) {
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", x);
    t.setAttribute("y", y);
    t.setAttribute("font-family", "Helvetica, Arial, sans-serif");
    t.setAttribute("font-size", size);
    t.setAttribute("fill", "#1a1a1a");
    t.setAttribute("dominant-baseline", "middle");
    t.textContent = text;
    return t;
  }

  function buildSVG() {
    svg.innerHTML = "";

    const scene = document.createElementNS(SVG_NS, "g");

    const lightW = 78;
    const gapX = 7;
    const normalH = 58;
    const tallH = normalH * 1.35;
    const gapY = 7;

    const rightEdge = 620;
    const numberX = rightEdge + 72;

    const largeDarkW = lightW * 2.5 * 0.6;
    const smallDarkW = lightW * 1.5 * 0.6;

    let y = 0;

    APARTMENTS.forEach(apt => {
      const isSmall = [4, 5, 11, 12].includes(apt.id);
      const isTall = [4, 5].includes(apt.id);
      const h = isTall ? tallH : normalH;
      const darkW = isSmall ? smallDarkW : largeDarkW;
      const colors = getStatusColors(apt.status);

      const totalW = darkW + gapX + lightW;
      const x = rightEdge - totalW;

      const unit = document.createElementNS(SVG_NS, "g");
      unit.setAttribute("class", "apt-unit");
      unit.setAttribute("id", `svg-apt-${apt.id}`);
      unit.setAttribute("data-id", apt.id);

      unit.appendChild(createRect(x, y, darkW, h, colors.living, "living"));
      unit.appendChild(createRect(x + darkW + gapX, y, lightW, h, colors.balcony, "balcony"));

      const outline = createRect(x, y, totalW, h, "none", "apt-outline");
      outline.setAttribute("stroke", "transparent");
      outline.setAttribute("stroke-width", "3");
      unit.appendChild(outline);

      unit.appendChild(createText(numberX, y + h / 2, apt.id, 30));

      scene.appendChild(unit);

      y += h + gapY;
    });

    svg.appendChild(scene);

    const bbox = scene.getBBox();
    const vb = svg.viewBox.baseVal;
    const margin = 60;

    const scale = Math.min(
      (vb.width - margin * 2) / bbox.width,
      (vb.height - margin * 2) / bbox.height
    );

    const tx = (vb.width - bbox.width * scale) / 2 - bbox.x * scale;
    const ty = (vb.height - bbox.height * scale) / 2 - bbox.y * scale;

    scene.setAttribute("transform", `translate(${tx}, ${ty}) scale(${scale})`);

    svg.querySelectorAll(".apt-unit").forEach(el => {
      el.addEventListener("mouseenter", () => highlightApt(el.dataset.id, true));
      el.addEventListener("mouseleave", () => highlightApt(el.dataset.id, false));
      el.addEventListener("click", () => {
        const apt = APARTMENTS.find(a => a.id === +el.dataset.id);
        if (apt && apt.factsheet && apt.factsheet !== "#") window.location.href = apt.factsheet;
      });
    });
  }

  let activeFilters = { type: "all", status: "all" };
  let sortCol = "id";
  let sortDir = 1;

  function statusClass(status) {
    if (status === "Verfügbar") return "status-verfuegbar";
    if (status === "Reserviert") return "status-reserviert";
    if (status === "Vermietet") return "status-vermietet";
    return "";
  }

  function renderTable() {
    let data = APARTMENTS.filter(a => {
      if (activeFilters.type !== "all" && a.type !== activeFilters.type) return false;
      if (activeFilters.status !== "all" && a.status !== activeFilters.status) return false;
      return true;
    });

    data.sort((a, b) => {
      const av = a[sortCol];
      const bv = b[sortCol];
      if (typeof av === "string") return sortDir * av.localeCompare(bv);
      return sortDir * (av - bv);
    });

    const tbody = document.getElementById("apt-tbody");

    tbody.innerHTML = data.map(a => `
      <tr data-id="${a.id}" class="${statusClass(a.status)}">
        <td class="apt-id">${a.id}</td>
        <td class="apt-rooms">${a.rooms}</td>
        <td class="apt-size">${a.size} m²</td>
        <td>
          <span class="status-dot"></span>
          <span class="status-label">${a.status}</span>
        </td>
        <td><a class="factsheet-link" href="${a.factsheet}">PDF ↗</a></td>
      </tr>
    `).join("");

    tbody.querySelectorAll("tr").forEach(row => {
      row.addEventListener("mouseenter", () => highlightApt(row.dataset.id, true));
      row.addEventListener("mouseleave", () => highlightApt(row.dataset.id, false));
      row.addEventListener("click", () => {
        const apt = APARTMENTS.find(a => a.id === +row.dataset.id);
        if (apt && apt.factsheet && apt.factsheet !== "#") window.location.href = apt.factsheet;
      });
    });

    document.querySelectorAll(".apt-unit").forEach(el => {
      const id = +el.dataset.id;
      const visible = data.some(a => a.id === id);
      el.style.opacity = visible ? "1" : "0.2";
    });
  }

  function highlightApt(id, on) {
    const row = document.querySelector(`#apt-tbody tr[data-id="${id}"]`);
    if (row) row.classList.toggle("highlighted", on);

    const svgUnit = document.getElementById(`svg-apt-${id}`);
    if (svgUnit) svgUnit.classList.toggle("highlighted", on);
  }

  document.querySelectorAll(".btn-filter").forEach(btn => {
    btn.addEventListener("click", () => {
      const group = btn.dataset.filter;
      document.querySelectorAll(`[data-filter="${group}"]`).forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      activeFilters[group] = btn.dataset.val;
      renderTable();
    });
  });

  document.getElementById("btn-reset").addEventListener("click", () => {
    activeFilters = { type: "all", status: "all" };
    document.querySelectorAll(".btn-filter").forEach(b => {
      b.classList.toggle("active", b.dataset.val === "all");
    });
    renderTable();
  });

  document.querySelectorAll("thead th[data-col]").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;

      if (sortCol === col) sortDir *= -1;
      else {
        sortCol = col;
        sortDir = 1;
      }

      renderTable();
    });
  });

  async function init() {
    APARTMENTS = await loadSheetData();
    buildSVG();
    renderTable();
  }

  init().catch(err => {
    console.error("Sheet loading failed:", err);

    APARTMENTS = [
      { id: 1, type: "T1", rooms: 2.5, size: 68, status: "Reserviert", factsheet: "#" },
      { id: 2, type: "T1", rooms: 2.5, size: 68, status: "Reserviert", factsheet: "#" },
      { id: 3, type: "T1", rooms: 2.5, size: 68, status: "Verfügbar", factsheet: "#" },
      { id: 4, type: "T2", rooms: 2.0, size: 52, status: "Vermietet", factsheet: "#" },
      { id: 5, type: "T2", rooms: 2.0, size: 52, status: "Reserviert", factsheet: "#" },
      { id: 6, type: "T1", rooms: 2.5, size: 68, status: "Vermietet", factsheet: "#" },
      { id: 7, type: "T1", rooms: 2.5, size: 68, status: "Vermietet", factsheet: "#" },
      { id: 8, type: "T1", rooms: 2.5, size: 68, status: "Verfügbar", factsheet: "#" },
      { id: 9, type: "T1", rooms: 2.5, size: 68, status: "Reserviert", factsheet: "#" },
      { id: 10, type: "T1", rooms: 2.5, size: 68, status: "Verfügbar", factsheet: "#" },
      { id: 11, type: "T3", rooms: 1.5, size: 32, status: "Vermietet", factsheet: "#" },
      { id: 12, type: "T3", rooms: 1.5, size: 32, status: "Reserviert", factsheet: "#" },
      { id: 13, type: "T1", rooms: 2.5, size: 68, status: "Reserviert", factsheet: "#" },
      { id: 14, type: "T1", rooms: 2.5, size: 68, status: "Verfügbar", factsheet: "#" },
      { id: 15, type: "T1", rooms: 2.5, size: 68, status: "Vermietet", factsheet: "#" }
    ];

    buildSVG();
    renderTable();
  });
</script>

</body>
</html>
